<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>מחברת התכנון · יובל</title>
<link href="https://fonts.googleapis.com/css2?family=Assistant:wght@400;600;700;800&family=Rubik:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
  --cream:#f5f0e9;--paper:#fdfaf6;--warm:#e8dfd2;--bd:#c5b9aa;
  --mid:#9a8e84;--sub:#7a6e64;--tx:#241608;
  --imp:#6233bb;--rot:#2d7a42;--fit:#b8305a;--bday:#a86c10;
}
body{font-family:'Rubik',sans-serif;background:var(--cream);color:var(--tx);direction:rtl}
.hdr{background:var(--paper);border-bottom:2px solid var(--bd);padding:12px 16px 0;
  position:sticky;top:0;z-index:50;box-shadow:0 2px 12px rgba(36,22,8,.1)}
.htop{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.hbrand{display:flex;align-items:center;gap:10px}
.hlogo{width:40px;height:40px;border-radius:10px;background:var(--tx);color:var(--paper);
  display:flex;align-items:center;justify-content:center;
  font-family:'Assistant',sans-serif;font-size:22px;font-weight:800}
.hname{font-family:'Assistant',sans-serif;font-size:26px;font-weight:800;line-height:1.1}
.hsub{font-size:13px;color:var(--mid);margin-top:3px;font-weight:500}
.sync{font-size:11px;font-weight:600;padding:4px 10px;border-radius:20px;background:var(--warm);color:var(--mid)}
.sync.ok{background:#d6f0da;color:#1a5e28}
.sync.err{background:#f5dada;color:#8e1a1a}
.tabs{display:flex;overflow-x:auto;scrollbar-width:none}
.tabs::-webkit-scrollbar{display:none}
.tab{flex-shrink:0;padding:10px 16px;border:none;background:none;
  font-family:'Rubik',sans-serif;font-size:14px;font-weight:500;color:var(--mid);
  cursor:pointer;border-bottom:3px solid transparent;white-space:nowrap}
.tab.on{color:var(--tx);border-bottom-color:var(--tx);font-weight:700}
.nav{display:flex;align-items:center;gap:10px;padding:10px 14px;
  background:var(--paper);border-bottom:1px solid var(--warm)}
.arr{width:34px;height:34px;border-radius:7px;border:1.5px solid var(--bd);
  background:var(--warm);color:var(--sub);cursor:pointer;font-size:20px;font-weight:700;
  display:flex;align-items:center;justify-content:center;transition:all .15s;flex-shrink:0}
.arr:hover{background:var(--tx);color:var(--paper);border-color:var(--tx)}
.ninfo{flex:1;text-align:center;cursor:pointer}
.ntitle{font-family:'Assistant',sans-serif;font-size:30px;font-weight:800}
.nsub{font-size:14px;color:var(--mid);margin-top:3px;font-weight:500}
.ncnt{font-size:11px;color:var(--mid);white-space:nowrap}
.pills{display:flex;gap:4px;justify-content:center;flex-wrap:wrap;
  padding:7px 14px 9px;background:var(--paper);border-bottom:1px solid var(--warm)}
.pill{padding:4px 11px;border-radius:20px;border:1.5px solid var(--bd);
  background:none;font-size:11px;font-weight:600;color:var(--mid);cursor:pointer}
.pill.on{background:var(--tx);color:var(--paper);border-color:var(--tx)}
.pill.now{border-color:var(--imp);color:var(--imp);font-weight:700}
.pill.has{border-color:var(--rot);color:var(--rot)}
.swrap{overflow-x:auto;-webkit-overflow-scrolling:touch;padding:8px 8px 90px}
.grid-tbl{border-collapse:collapse;table-layout:fixed;min-width:calc(70px + 7*130px);width:100%;border:1.5px solid var(--bd);border-radius:10px;overflow:hidden;border-spacing:0}
.grid-tbl th.corner{background:#e0e0e0;width:70px;border:none}
.grid-tbl th.dh{width:calc((100% - 68px) / 7)}
.grid-tbl th.dh.tod{background:#c8c4c0}
.dday{font-family:'Assistant',sans-serif;font-size:14px;font-weight:700;display:block}
.ddt{font-size:10px;color:var(--mid);display:block;margin-top:1px}
.grid-tbl th.dh.tod .dday{color:var(--imp)}
.rl-th{background:#e0e0e0;text-align:center;vertical-align:middle;font-family:'Assistant',sans-serif;font-size:12px;font-weight:700;padding:4px 6px;border:1px solid var(--bd);width:68px;white-space:nowrap}
.cell-td{background:var(--paper);padding:3px;min-width:130px;vertical-align:top;
  border:1px solid var(--bd);cursor:text}
.cell-td.tod{background:#fdf6ee}
.cell-td:hover{background:#faf3e8}
.cell-td.dov{background:#e8f4e8;outline:2px dashed var(--rot)}
.chip{display:flex;align-items:flex-start;gap:3px;font-size:11px;line-height:1.35;
  padding:3px 6px;margin-bottom:2px;border-radius:4px;cursor:pointer;
  border-right:3px solid var(--ca,#c5b9aa);background:var(--cb,#f0ebe3);
  position:relative}
.chip.done{opacity:.28;text-decoration:line-through}
.ct{flex:1;word-break:break-word}
.cbts{display:flex;flex-direction:row;gap:3px;align-items:center;flex-shrink:0;margin-left:3px}

.cbt{display:inline-flex;align-items:center;background:rgba(0,0,0,.1);border:1px solid rgba(0,0,0,.15);cursor:pointer;padding:1px 5px;font-size:11px;color:#333;border-radius:3px;line-height:1.5;flex-shrink:0;font-family:'Rubik',sans-serif}
.cbt:hover{background:rgba(0,0,0,.2);color:#000}
.cbt.x{background:rgba(192,57,43,.12);border-color:rgba(192,57,43,.3);color:#c0392b}
.ri .chip{--cb:#eeebf8;--ca:var(--imp)}
.rr .chip{--cb:#e8f2ea;--ca:var(--rot)}
.rf .chip{--cb:#f9eaed;--ca:var(--fit)}
.rb .chip{--cb:#f8f2e2;--ca:var(--bday)}
.chip[data-c="red"]    {--cb:#ef5350!important;--ca:#b71c1c!important;color:#fff!important}
.chip[data-c="orange"] {--cb:#ff7043!important;--ca:#bf360c!important;color:#fff!important}
.chip[data-c="yellow"] {--cb:#ffca28!important;--ca:#f57f17!important;color:#333!important}
.chip[data-c="lime"]   {--cb:#9ccc65!important;--ca:#33691e!important;color:#fff!important}
.chip[data-c="neon"]   {--cb:#39ff14!important;--ca:#007700!important;color:#111!important}
.chip[data-c="green"]  {--cb:#26a69a!important;--ca:#004d40!important;color:#fff!important}
.chip[data-c="teal"]   {--cb:#26c6da!important;--ca:#006064!important;color:#fff!important}
.chip[data-c="cyan"]   {--cb:#29b6f6!important;--ca:#01579b!important;color:#fff!important}
.chip[data-c="blue"]   {--cb:#42a5f5!important;--ca:#0d47a1!important;color:#fff!important}
.chip[data-c="indigo"] {--cb:#5c6bc0!important;--ca:#1a237e!important;color:#fff!important}
.chip[data-c="purple"] {--cb:#ab47bc!important;--ca:#4a148c!important;color:#fff!important}
.chip[data-c="pink"]   {--cb:#ec407a!important;--ca:#880e4f!important;color:#fff!important}
.chip[data-c="brown"]  {--cb:#8d6e63!important;--ca:#3e2723!important;color:#fff!important}
.chip[data-c="dbrown"] {--cb:#5d4037!important;--ca:#1b0000!important;color:#fff!important}
.chip[data-c="gray"]   {--cb:#78909c!important;--ca:#263238!important;color:#fff!important}
.chip[data-c="gold"]   {--cb:#ffd54f!important;--ca:#e65100!important;color:#333!important}
.chip[data-c="salmon"] {--cb:#f06292!important;--ca:#880e4f!important;color:#fff!important}
.chip[data-c="gray1"]  {--cb:#f5f5f5;--ca:#757575;color:#111!important}
.chip[data-c="gray2"]  {--cb:#bdbdbd;--ca:#424242;color:#111!important}
.chip[data-c="gray3"]  {--cb:#757575;--ca:#212121;color:#fff!important}
.chip[data-c="black"]  {--cb:#424242;--ca:#000;color:#fff!important}
.chip[data-c="red1"]   {--cb:#ffcdd2;--ca:#c62828;color:#111!important}
.chip[data-c="red2"]   {--cb:#ef5350;--ca:#b71c1c;color:#fff!important}
.chip[data-c="red3"]   {--cb:#c62828;--ca:#7f0000;color:#fff!important}
.chip[data-c="pink1"]  {--cb:#fce4ec;--ca:#880e4f;color:#111!important}
.chip[data-c="pink2"]  {--cb:#ec407a;--ca:#880e4f;color:#fff!important}
.chip[data-c="pink3"]  {--cb:#ad1457;--ca:#4a0030;color:#fff!important}
.chip[data-c="orange1"]{--cb:#ffe0b2;--ca:#e65100;color:#111!important}
.chip[data-c="orange2"]{--cb:#ff7043;--ca:#bf360c;color:#fff!important}
.chip[data-c="orange3"]{--cb:#e64a19;--ca:#7f1900;color:#fff!important}
.chip[data-c="yellow1"]{--cb:#fff9c4;--ca:#f57f17;color:#111!important}
.chip[data-c="yellow2"]{--cb:#ffca28;--ca:#e65100;color:#111!important}
.chip[data-c="gold"]   {--cb:#ffa000;--ca:#e65100;color:#111!important}
.chip[data-c="neon"]   {--cb:#ccff90;--ca:#1b5e20;color:#111!important}
.chip[data-c="lime"]   {--cb:#dcedc8;--ca:#33691e;color:#111!important}
.chip[data-c="green1"] {--cb:#c8e6c9;--ca:#1b5e20;color:#111!important}
.chip[data-c="green2"] {--cb:#388e3c;--ca:#1b5e20;color:#fff!important}
.chip[data-c="teal1"]  {--cb:#b2dfdb;--ca:#004d40;color:#111!important}
.chip[data-c="teal2"]  {--cb:#00897b;--ca:#004d40;color:#fff!important}
.chip[data-c="cyan"]   {--cb:#b3e5fc;--ca:#01579b;color:#111!important}
.chip[data-c="blue1"]  {--cb:#bbdefb;--ca:#0d47a1;color:#111!important}
.chip[data-c="blue2"]  {--cb:#1e88e5;--ca:#0d47a1;color:#fff!important}
.chip[data-c="blue3"]  {--cb:#1565c0;--ca:#002171;color:#fff!important}
.chip[data-c="indigo"] {--cb:#c5cae9;--ca:#1a237e;color:#111!important}
.chip[data-c="purple1"]{--cb:#f3e5f5;--ca:#4a148c;color:#111!important}
.chip[data-c="purple2"]{--cb:#ce93d8;--ca:#4a148c;color:#111!important}
.chip[data-c="purple3"]{--cb:#7b1fa2;--ca:#4a148c;color:#fff!important}
.chip[data-c="brown1"] {--cb:#efebe9;--ca:#4e342e;color:#111!important}
.chip[data-c="brown2"] {--cb:#d7ccc8;--ca:#3e2723;color:#111!important}
.chip[data-c="brown3"] {--cb:#bcaaa4;--ca:#3e2723;color:#111!important}
.chip[data-c="brown4"] {--cb:#8d6e63;--ca:#3e2723;color:#fff!important}
.chip[data-c="brown5"] {--cb:#6d4c41;--ca:#3e2723;color:#fff!important}
.chip[data-c="brown6"] {--cb:#4e342e;--ca:#1a0000;color:#fff!important}
.cedit{width:100%;background:var(--paper);border:1.5px solid var(--tx);
  border-radius:4px;padding:3px 6px;font-size:11px;font-family:'Rubik',sans-serif;
  color:var(--tx);outline:none;resize:none;overflow:hidden;line-height:1.35}
.cinp{display:block;width:100%;background:none;border:none;outline:none;
  font-family:'Rubik',sans-serif;font-size:11px;color:var(--tx);
  padding:3px 6px;border-radius:4px;min-height:20px}
.cinp::placeholder{color:transparent}
.cell-td:hover .cinp::placeholder,.cell-td:focus-within .cinp::placeholder{color:var(--bd)}
.cinp:focus{background:#ede2d4}
.pal{position:fixed;z-index:999;background:var(--paper);border:1.5px solid var(--bd);border-radius:12px;padding:12px;display:flex;flex-wrap:wrap;gap:8px;width:340px;box-shadow:0 6px 28px rgba(36,22,8,.22);visibility:hidden;box-sizing:border-box}
.dot{width:28px;height:28px;border-radius:50%;cursor:pointer;border:2.5px solid transparent;transition:transform .12s;flex-shrink:0}
.dot:hover{transform:scale(1.3)}
.dot.cur{border-color:var(--tx);transform:scale(1.15)}
.awrap{padding:8px 8px 90px}
.amon{margin-bottom:16px}
.amtitle{font-family:'Assistant',sans-serif;font-size:17px;font-weight:800;
  padding:8px 12px;background:var(--paper);border:1.5px solid var(--bd);
  border-radius:10px 10px 0 0;border-bottom:none}
.amtbl{border-collapse:collapse;width:100%;border:1.5px solid var(--bd);
  border-radius:0 0 10px 10px;overflow:hidden}
.amtbl th{background:var(--warm);font-family:'Assistant',sans-serif;
  font-size:11px;font-weight:700;color:var(--sub);text-align:center;
  padding:5px 2px;border:1px solid var(--bd)}
.amtbl td{background:var(--paper);min-height:48px;padding:4px 3px;
  cursor:pointer;border:1px solid var(--bd);vertical-align:top;min-width:48px}
.amtbl td.empty{background:var(--cream);cursor:default}
.amtbl td.tod{background:var(--tx);color:var(--paper)}
.amtbl td:hover:not(.empty):not(.tod){background:var(--warm)}
.adn{font-family:'Assistant',sans-serif;font-size:12px;font-weight:700;margin-bottom:2px}
.ach{font-size:9px;line-height:1.2;padding:1px 3px;border-radius:3px;margin-bottom:1px;
  display:block;overflow:hidden;white-space:nowrap;text-overflow:ellipsis;
  border-right:2px solid}
.mwrap{padding:8px 8px 90px}
.mtbl{border-collapse:collapse;width:100%;border:1.5px solid var(--bd);
  border-radius:10px;overflow:hidden}
.mtbl th{background:var(--warm);font-family:'Assistant',sans-serif;
  font-size:12px;font-weight:700;color:var(--sub);text-align:center;
  padding:8px 2px;border:1px solid var(--bd)}
.mtbl td{background:var(--paper);min-height:56px;padding:4px 3px;
  cursor:pointer;border:1px solid var(--bd);vertical-align:top}
.mtbl td.empty{background:var(--cream);cursor:default}
.mtbl td.tod{background:var(--tx)}
.mtbl td.sel{outline:2px solid var(--tx);outline-offset:-2px}
.mtbl td:hover:not(.empty){background:#f5ede0}
.mcn{font-family:'Assistant',sans-serif;font-size:14px;font-weight:700;
  color:var(--tx);margin-bottom:2px}
.mtbl td.tod .mcn{color:var(--paper)}
.mcc{font-size:10px;line-height:1.25;padding:2px 4px;border-radius:3px;
  margin-bottom:2px;display:block;overflow:hidden;white-space:nowrap;text-overflow:ellipsis;
  border-right:2px solid}
.mdpanel{margin-top:8px;background:var(--paper);border:1.5px solid var(--bd);
  border-radius:10px;padding:12px}
.mdtitle{font-family:'Assistant',sans-serif;font-size:18px;font-weight:800;margin-bottom:8px}
.mdi{display:flex;align-items:center;padding:7px 9px;border-radius:6px;
  margin-bottom:3px;font-size:12px;cursor:pointer;border-right:3px solid}
.mdi:hover{opacity:.75}
.mdi.done span{text-decoration:line-through;opacity:.4}
.dwrap{padding:8px 12px 90px}
.dsec{margin-bottom:14px}
.dsecttl{font-family:'Assistant',sans-serif;font-size:15px;font-weight:800;
  padding:8px 12px;border-right:4px solid;
  border:1.5px solid var(--bd);border-bottom:none;border-radius:10px 10px 0 0}
.dlist{background:var(--paper);border:1.5px solid var(--bd);
  border-radius:0 0 10px 10px;overflow:hidden}
.dtask{display:flex;align-items:flex-start;gap:9px;padding:9px 12px;
  border-bottom:1px solid var(--warm)}
.dtask:last-child{border-bottom:none}
.dtask.done .dtitle{text-decoration:line-through;opacity:.35}
.dchk{width:18px;height:18px;border-radius:5px;border:2px solid var(--bd);
  flex-shrink:0;margin-top:1px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.dtask.done .dchk{background:var(--mid);border-color:var(--mid)}
.dtitle{flex:1;font-size:12px;line-height:1.4}
.dbadge{font-size:10px;font-weight:700;padding:2px 7px;border-radius:10px;
  color:#fff;background:var(--imp);align-self:center;flex-shrink:0}
.dact{background:none;border:none;color:var(--mid);cursor:pointer;font-size:14px;padding:0 3px}
.bkwrap{padding:10px 10px 90px}
.bkadd{display:flex;gap:7px;flex-wrap:wrap;background:var(--paper);
  border:1.5px solid var(--bd);border-radius:10px;padding:12px;margin-bottom:12px}
.bkinp{flex:1;min-width:140px;background:var(--cream);border:1.5px solid var(--bd);
  border-radius:7px;padding:8px 11px;font-size:13px;font-family:'Rubik',sans-serif;
  color:var(--tx);outline:none}
.bkinp:focus{border-color:var(--tx)}
.bksel{background:var(--cream);border:1.5px solid var(--bd);border-radius:7px;
  padding:8px;font-size:12px;font-family:'Rubik',sans-serif;color:var(--tx);outline:none}
.bkbtn{background:var(--tx);color:var(--paper);border:none;border-radius:7px;
  padding:8px 14px;font-size:13px;font-weight:600;cursor:pointer;font-family:'Rubik',sans-serif}
.boards{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:10px}
.board{background:var(--paper);border:1.5px solid var(--bd);border-radius:10px;overflow:hidden}
.bhdr{padding:10px 13px;font-family:'Assistant',sans-serif;font-size:14px;font-weight:800;
  border-bottom:1px solid var(--warm);border-right:4px solid;
  display:flex;align-items:center;justify-content:space-between}
.bdel{background:none;border:none;color:var(--mid);cursor:pointer;font-size:18px;line-height:1}
.bdel:hover{color:#c0392b}
.btask{display:flex;align-items:center;gap:8px;padding:8px 12px;
  border-bottom:1px solid var(--warm);font-size:12px}
.btask:last-of-type{border-bottom:none}
.bchk{width:17px;height:17px;border-radius:4px;border:2px solid var(--bd);
  flex-shrink:0;cursor:pointer;display:flex;align-items:center;justify-content:center}
.btask.done .bchk{background:var(--mid);border-color:var(--mid)}
.btask.done .btxt{text-decoration:line-through;opacity:.4}
.btxt{flex:1;cursor:pointer}
.btdel{background:none;border:none;color:transparent;cursor:pointer;font-size:14px;font-weight:700;padding:0 2px}
.btask:hover .btdel{color:#c0392b}
.binp{width:100%;padding:8px 12px;background:none;border:none;
  border-top:1px dashed var(--bd);font-family:'Rubik',sans-serif;
  font-size:12px;color:var(--tx);outline:none}
.binp::placeholder{color:var(--mid)}
.pbg{position:fixed;inset:0;background:rgba(36,22,8,.44);backdrop-filter:blur(4px);
  z-index:200;display:none;align-items:center;justify-content:center;padding:16px}
.pbg.on{display:flex}
.pop{background:var(--paper);border-radius:13px;padding:18px;
  width:100%;max-width:340px;box-shadow:0 12px 44px rgba(36,22,8,.28)}
.popt{font-family:'Assistant',sans-serif;font-size:18px;font-weight:800;margin-bottom:12px}
.plbl{font-size:10px;font-weight:700;color:var(--mid);letter-spacing:.6px;
  margin-bottom:3px;display:block;text-transform:uppercase}
.pinp{width:100%;background:var(--cream);border:1.5px solid var(--bd);
  border-radius:7px;padding:8px 11px;font-size:13px;font-family:'Rubik',sans-serif;
  color:var(--tx);outline:none;margin-bottom:9px}
.pinp:focus{border-color:var(--tx)}
.p2{display:grid;grid-template-columns:1fr 1fr;gap:7px}
.pacts{display:flex;gap:7px;margin-top:12px}
.pbtn{flex:1;padding:10px;border-radius:7px;border:none;
  font-family:'Rubik',sans-serif;font-size:13px;font-weight:600;cursor:pointer}
.pbtn-s{background:var(--tx);color:var(--paper)}
.pbtn-c{background:var(--warm);color:var(--sub)}
.pbtn-d{background:#c0392b;color:#fff;flex:0 0 68px}
.toast{position:fixed;top:64px;left:50%;transform:translateX(-50%);
  background:var(--tx);color:var(--paper);border-radius:8px;padding:8px 20px;
  font-size:12px;font-weight:600;z-index:999;display:none;white-space:nowrap}
.sec{display:none}.sec.on{display:block}
</style>
</head>
<body>
<header class="hdr">
  <div class="htop">
    <div class="hbrand">
        <div>
        <div class="hname">מחברת התכנון שלי</div>
        <div class="hsub">יובל גיאת · רכז בוגרת מבואות ים</div>
      </div>
    </div>
    <span class="sync" id="sy">✓</span>
  </div>
  <div class="tabs">
    <button class="tab" id="tab-a">📆 שנתי</button>
    <button class="tab" id="tab-m">🗓 חודשי</button>
    <button class="tab on" id="tab-w">📋 שבועי</button>
    <button class="tab" id="tab-d">✅ יומי</button>
    <button class="tab" id="tab-b">📚 בנק משימות</button>
  </div>
</header>

<div class="sec on" id="sec-w">
  <div class="nav">
    <button class="arr" id="wPrev">&#8249;</button>
    <div class="ninfo" id="wInfo" title="לשבוע הנוכחי">
      <div class="ntitle" id="wNum"></div>
      <div class="nsub" id="wDates"></div>
    </div>
    <span class="ncnt" id="wCnt"></span>
    <button class="arr" id="wNext">&#8250;</button>
  </div>
  <div class="pills" id="pills"></div>
  <div class="swrap"><table class="grid-tbl" id="grid"></table></div>
</div>

<div class="sec" id="sec-a">

function p2(n){return String(n).padStart(2,"0")}
function isoS(d){return d.getFullYear()+"-"+p2(d.getMonth()+1)+"-"+p2(d.getDate())}
function fromI(s){var p=s.split("-");return new Date(+p[0],+p[1]-1,+p[2])}
function sDay(a,b){return a&&b&&a.getFullYear()===b.getFullYear()&&a.getMonth()===b.getMonth()&&a.getDate()===b.getDate()}
function fmt(d){return d.getDate()+" "+HM[d.getMonth()]}
function wNow(){return isoW(new Date())}
function isoW(d){
  // שבוע מתחיל ביום ראשון, בסיס = ראשון הראשון של השנה
  var y=d.getFullYear();
  var jan1=new Date(y,0,1);
  var daysToSun=(7-jan1.getDay())%7; // ימים עד ראשון הראשון
  var firstSun=new Date(y,0,1+daysToSun);
  var diff=Math.floor((d-firstSun)/864e5);
  if(diff<0)return 0;
  return Math.floor(diff/7)+1;
}
function wDays(w,y){
  // מחזיר 7 ימים של שבוע w (ראשון עד שבת)
  var jan1=new Date(y,0,1);
  var daysToSun=(7-jan1.getDay())%7;
  var firstSun=new Date(y,0,1+daysToSun);
  var start=new Date(firstSun);
  start.setDate(firstSun.getDate()+(w-1)*7);
  var r=[];for(var i=0;i<7;i++){var d=new Date(start);d.setDate(start.getDate()+i);r.push(d)}
  return r;
}
function totW(y){return isoW(new Date(y,11,28))}
function el(tag,cls,txt){var e=document.createElement(tag);if(cls)e.className=cls;if(txt!=null)e.textContent=txt;return e}
function r4(r){for(var i=0;i<ROWS.length;i++)if(ROWS[i].id===r)return ROWS[i];return ROWS[1]}

function recurOn(t,d){
  if(!t.recurrence||t.recurrence==="none"||!t.date)return false;
  var s=fromI(t.date);if(d<s)return false;
  if(t.recurrence==="daily")return true;
  if(t.recurrence==="weekly")return d.getDay()===s.getDay();
  if(t.recurrence==="monthly")return d.getDate()===s.getDate();
  if(t.recurrence==="yearly")return d.getDate()===s.getDate()&&d.getMonth()===s.getMonth();
  return false;
}
function tFor(d){
  var is=isoS(d),res=[];
  for(var i=0;i<T.length;i++){
    var t=T[i];
    if(t.recurrence&&t.recurrence!=="none"){
      if(recurOn(t,d)){var x=Object.assign({},t);x._occ=is;x.completed=!!CR[t.id+"_"+is];res.push(x)}
    }else if(t.date===is){res.push(t)}
  }
  return res;
}

function loadLocal(){

}

  clearTimeout(_ft);

function fbPush(){
  fetch(FB+"/yuval.json",{method:"PUT",headers:{"Content-Type":"application/json"},

  .then(function(r){setSync(r.ok,"✓ גובה")})
  .catch(function(){setSync(false,"✕ מקומי")});
}
function mergeWithSeed(fbTasks, fbCrec, fbBoards){
  // Firebase מנצח על הכל — כולל date/week/year/row/מחיקות
  var seedIds=new Set(SEED.map(function(t){return t.id}));
  T=[];
  fbTasks.forEach(function(fb){
    var seed=SEED.find(function(t){return t.id===fb.id});
    if(seed){
      T.push(Object.assign({color:"none"},seed,fb,{color:fb.color||"none"}));
    }else{
      T.push(Object.assign({color:"none"},fb));
    }
  });
  CR=fbCrec||{};
  if(fbBoards&&fbBoards.length>0)BDS=fbBoards;
}

function fbLoad(){
  return fetch(FB+"/yuval.json").then(function(r){return r.json()}).then(function(d){
    if(d&&d.tasks&&d.tasks.length>0){
      mergeWithSeed(d.tasks, d.crec, d.boards);
      setSync(true,"✓ גובה");
      saveLocal(); // שמור גם מקומית
    }else{
      // Firebase ריק — נסה localStorage
      if(!loadLocal()){
        // גם localStorage ריק — push seed
        fbPush();
      }
    }
  }).catch(function(){
    // Firebase נכשל — טען מ-localStorage
    setSync(false,"✕ מקומי");
    loadLocal();
  });
}

function rW(){
  var days=wDays(WW,WY),today=new Date();
  document.getElementById("wNum").textContent="שבוע "+WW;
  document.getElementById("wDates").textContent=fmt(days[0])+" – "+fmt(days[6])+" · "+WY;
  var cnt=0;days.forEach(function(d){cnt+=tFor(d).length});
  document.getElementById("wCnt").textContent=cnt?cnt+" משימות":"";

  // pills
  var tw=totW(WY),rw=wNow(),ps=WW,pe=Math.min(tw,WW+3);
  var pr=document.getElementById("pills");
  while(pr.firstChild)pr.removeChild(pr.firstChild);
  for(var w=ps;w<=pe;w++){
    var p=el("button","pill"+(w===WW?" on":w===rw&&WY===new Date().getFullYear()?" now":""),("שבוע "+w));
    if(w!==WW&&T.some(function(t){return t.year===WY&&t.week===w}))p.classList.add("has");
    (function(ww){p.onclick=function(){WW=ww;rW()}})(w);
    pr.appendChild(p);
  }

  // table
  var tbl=document.getElementById("grid");
  while(tbl.firstChild)tbl.removeChild(tbl.firstChild);

  // header row
  var thead=document.createElement("thead");
  var hr=document.createElement("tr");
  var corner=document.createElement("th");corner.className="corner";hr.appendChild(corner);
  days.forEach(function(d){
    var th=document.createElement("th");th.className="dh"+(sDay(d,today)?" tod":"");
    var s1=el("span","dday",HD[d.getDay()]);
    var s2=el("span","ddt",d.getDate()+"."+(d.getMonth()+1));
    th.appendChild(s1);th.appendChild(s2);hr.appendChild(th);
  });
  thead.appendChild(hr);tbl.appendChild(thead);

  // body rows
  var tbody=document.createElement("tbody");
  ROWS.forEach(function(row){
    var tr=document.createElement("tr");
    var rlth=document.createElement("th");rlth.className="rl-th";
    rlth.style.color=row.col;rlth.style.borderRightColor=row.col;
    rlth.textContent=row.l;tr.appendChild(rlth);
    days.forEach(function(d){
      var is=isoS(d),tod=sDay(d,today);
      var td=document.createElement("td");
      td.className="cell-td "+(tod?"tod":"");
      td.dataset.row=row.id;td.dataset.date=is;
      var rT=tFor(d).filter(function(t){return(t.row||"routine")===row.id});
      rT.sort(function(a,b){return a.completed===b.completed?0:(a.completed?1:-1)});
      rT.forEach(function(t){td.appendChild(makeChip(t,row.rc))});
      // input
      var inp=el("input","cinp");inp.placeholder="…";
      inp.dataset.row=row.id;inp.dataset.date=is;
      inp.addEventListener("keydown",function(e){
        if(e.key==="Enter"&&inp.value.trim()){
          e.preventDefault();
          var d2=fromI(inp.dataset.date);
          mkT({title:inp.value.trim(),row:inp.dataset.row,date:inp.dataset.date,week:isoW(d2),year:d2.getFullYear()});
          inp.value="";
          WY=d2.getFullYear();WW=isoW(d2);
          rW();
        }
        if(e.key==="Escape")inp.blur();
      });
      td.appendChild(inp);
      // drag
      td.addEventListener("dragover",function(e){e.preventDefault();td.classList.add("dov")});
      td.addEventListener("dragleave",function(){td.classList.remove("dov")});
      td.addEventListener("drop",function(e){
        td.classList.remove("dov");
        var id=e.dataTransfer.getData("id");
        if(!id)return;
        var t=T.find(function(x){return x.id===id});
        if(t&&t.recurrence&&t.recurrence!=="none"){toast("משימה חוזרת — ערוך בלחיצה ימנית");return}
        movT(id,td.dataset.date,td.dataset.row);rW();toast("הועבר ✓");
      });
      tr.appendChild(td);
    });
    tbody.appendChild(tr);
  });
  tbl.appendChild(tbody);
}

// INLINE EDIT
function inEdit(id,chip){
  var t=null;for(var i=0;i<T.length;i++)if(T[i].id===id){t=T[i];break}
  if(!t)return;
  var ct=chip.querySelector(".ct"),orig=t.title;
  var ta=el("textarea","cedit");ta.value=orig;ta.rows=1;
  function rsz(){ta.style.height="0";ta.style.height=ta.scrollHeight+"px"}
  ta.addEventListener("input",rsz);
  ta.addEventListener("keydown",function(e){
    if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();var v=ta.value.trim();if(v&&v!==orig){upd(id,{title:v});toast("עודכן ✓")}rW()}
    if(e.key==="Escape")rW();
  });
  ta.addEventListener("blur",function(){
    var v=ta.value.trim();
    if(v&&v!==orig)upd(id,{title:v});
    setTimeout(function(){if(document.activeElement!==ta)rW();},200);
  });
  ct.replaceWith(ta);chip.style.cursor="text";ta.focus();rsz();
}

// COLOR PALETTE
function cPal(){if(PAL){PAL.remove();PAL=null}}
function oPal(ev,id){
  cPal();
  var chip=ev.target.closest(".chip");
  if(!chip){
    // fallback — חפש לפי data-id
    chip=document.querySelector('.chip[data-id="'+id+'"]');
  }
  if(!chip){toast("לא נמצא תא");return;}
  var t=null;for(var i=0;i<T.length;i++)if(T[i].id===id){t=T[i];break}
  if(!t)return;
  var cur=t.color||"none";
  var pal=el("div","pal");
  CLRS.forEach(function(c){
    var d=el("div","dot"+(c.id===cur?" cur":""));
    d.style.background=c.h;
    d.addEventListener("click",function(e){e.stopPropagation();upd(id,{color:c.id});cPal();rW()});
    pal.appendChild(d);
  });
  document.body.appendChild(pal);
  var rect=chip.getBoundingClientRect();
  setTimeout(function(){
    var ph=pal.offsetHeight,pw=pal.offsetWidth;
    var top2=rect.top-ph-6+window.scrollY;
    if(top2<60)top2=rect.bottom+6+window.scrollY;
    var left=rect.right-pw;
    if(left<4)left=4;
    pal.style.top=top2+"px";pal.style.left=left+"px";pal.style.visibility="visible";
  },0);
  PAL=pal;
  setTimeout(function(){
    function hh(e){if(!pal.contains(e.target)){cPal();document.removeEventListener("click",hh)}}
    document.addEventListener("click",hh);
  },0);
}

function oPop(id){
  var t=null;for(var i=0;i<T.length;i++)if(T[i].id===id){t=T[i];break}
  if(!t)return;EID=id;
  document.getElementById("pTit").value=t.title;

  document.getElementById("pRem").value=t.reminder||"";

  setTimeout(function(){document.getElementById("pTit").focus()},80);
}
function cPop(){document.getElementById("pb").classList.remove("on");EID=null}
function sPop(){
  var title=document.getElementById("pTit").value.trim();

    recurrence:document.getElementById("pRec").value,
    reminder:document.getElementById("pRem").value});

}
